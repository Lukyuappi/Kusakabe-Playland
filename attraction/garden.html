<h1>チューリップ畑</h1>

  <img src="../img/garden.jpg" alt="チューリップ畑" class="attraction-img">

  <p>
    園内に広がる色とりどりのチューリップ畑。  
    春には満開のチューリップが咲き誇り、訪れる人々を魅了します。  
    写真撮影スポットとしても人気で、家族や友人との思い出作りに最適です。
  </p>

  <h2>特徴</h2>
  <ul>
    <li>場所：ガーデンエリア</li>
    <li>開催時期：春（4月～5月）</li>
  </ul>

  <h2>おすすめポイント</h2>
  <p>
    チューリップの花々が織りなす美しい景色を楽しむことができます。
